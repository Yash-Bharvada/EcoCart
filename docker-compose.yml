version: "3.9"

services:
  # ─────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecocart_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecocart-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ecocart_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./migrations/init_indexes.py:/docker-entrypoint-initdb.d/init_indexes.py
    environment:
      - MONGO_INITDB_DATABASE=ecocart
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecocart-network

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ecocart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecocart-network

  # ─────────────────────────────────────────────
  # Mongo Express (DB Admin UI) — dev only
  # ─────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: ecocart_mongo_express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - ecocart-network
    profiles:
      - dev

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  ecocart-network:
    driver: bridge
